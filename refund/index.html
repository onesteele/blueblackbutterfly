<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VantageQuant Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #f0f0f2;
            --surface: #ffffff;
            --border: #e5e5e7;
            --border-hover: #d1d1d4;
            --text: #0e0e0f;
            --text-secondary: #6b6b6f;
            --text-muted: #9b9ba0;
            --accent: #3b6dff;
            --accent-light: #9dbcff;
            --accent-bg: rgba(59, 109, 255, 0.08);
            --accent-border: rgba(59, 109, 255, 0.2);
            --success: #00b341;
            --success-bg: rgba(0, 179, 65, 0.08);
            --success-border: rgba(0, 179, 65, 0.2);
            --error: #e5484d;
            --error-bg: rgba(229, 72, 77, 0.06);
            --error-border: rgba(229, 72, 77, 0.2);
            --warning: #f5a623;
            --warning-bg: rgba(245, 166, 35, 0.08);
            --warning-border: rgba(245, 166, 35, 0.25);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 16px;
            min-height: 0;
        }

        /* ── Header ── */
        .page-header {
            text-align: center;
            margin-bottom: 14px;
            flex: none;
            animation: fadeIn 0.5s ease;
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 10px;
        }

        .whop-logo { height: 22px; opacity: 0.85; }
        .logo-x { font-size: 14px; font-weight: 600; color: var(--text-muted); user-select: none; }
        .pi-logo { height: 26px; border-radius: 6px; }

        .page-header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 2px;
        }

        .page-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ── Chat Card ── */
        .chat-card {
            width: 100%;
            max-width: 820px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease 0.1s both;
            flex: 1 1 auto;
            min-height: 0;
        }

        /* ── Chat Header ── */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex: none;
        }

        .agent-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
        }

        .agent-avatar::after {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--success);
            border: 2px solid var(--surface);
        }

        .agent-meta { flex: 1; min-width: 0; }

        .agent-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .agent-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--success);
            font-weight: 600;
        }

        .agent-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Messages Area ── */
        .chat-messages {
            flex: 1 1 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--bg-secondary);
            scroll-behavior: smooth;
            min-height: 0;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 100%;
            animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.agent { align-self: flex-start; max-width: 78%; }
        .msg-row.user { align-self: flex-end; max-width: 78%; justify-content: flex-end; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-bubble {
            padding: 13px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.55;
            word-wrap: break-word;
        }

        .msg-row.agent .msg-bubble {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .msg-row.user .msg-bubble {
            background: var(--accent);
            color: #fff;
            border-top-right-radius: 4px;
            font-weight: 500;
        }

        .msg-bubble p { margin: 0; }
        .msg-bubble p + p { margin-top: 8px; }
        .msg-bubble strong { font-weight: 700; }

        /* ── Typing indicator ── */
        .typing-row {
            display: flex;
            gap: 8px;
            align-self: flex-start;
            max-width: 85%;
            animation: msgIn 0.2s ease;
        }

        .typing-bubble {
            padding: 12px 16px;
            border-radius: 14px;
            border-top-left-radius: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.3s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ── Clause Callout ── */
        .clause-card {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text);
        }

        .clause-card .clause-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--warning);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .clause-card .clause-text { line-height: 1.55; color: var(--text-secondary); }

        /* ── Deterrent Wall ── */
        .deterrent-wall {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-top: 10px;
            font-size: 13px;
        }

        .deterrent-wall .dw-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--error);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deterrent-wall .dw-title svg { width: 14px; height: 14px; }

        .deterrent-wall ul { list-style: none; padding: 0; margin: 0; }

        .deterrent-wall li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 5px 0;
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
        }

        .deterrent-wall li::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--error);
            margin-top: 8px;
            flex-shrink: 0;
        }

        .deterrent-wall .dw-footer {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--error-border);
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-style: italic;
        }

        /* ── Loom Embed ── */
        .loom-embed {
            margin-top: 10px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
        }

        .loom-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .loom-embed .loom-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .loom-wrap { margin-top: 10px; }
        .loom-wrap .loom-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        /* ── Terminal CTA ── */
        .terminal-cta {
            margin-top: 10px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 18px;
            background: var(--accent);
            color: #fff;
            border: 0;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s ease;
            width: 100%;
        }

        .cta-btn:hover {
            background: #e5543a;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 109, 255, 0.25);
        }

        .cta-btn svg { width: 14px; height: 14px; }

        .cta-btn.secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .cta-btn.secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--border-hover);
            box-shadow: none;
        }

        /* ── Options Area ── */
        .chat-options {
            padding: 16px 22px 18px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            gap: 9px;
            flex: none;
            max-height: 42vh;
            overflow-y: auto;
        }

        .chat-options::-webkit-scrollbar { width: 6px; }
        .chat-options::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .chat-options-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .option-btn {
            padding: 13px 16px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            animation: msgIn 0.25s ease;
        }

        .option-btn:hover {
            border-color: var(--accent);
            background: var(--accent-bg);
            transform: translateX(2px);
        }

        .option-btn:active { transform: translateX(0) scale(0.99); }

        .option-btn .option-arrow {
            opacity: 0;
            color: var(--accent);
            font-size: 15px;
            transition: opacity 0.12s ease;
            font-weight: 700;
        }

        .option-btn:hover .option-arrow { opacity: 1; }

        .option-btn[data-variant="danger"]:hover {
            border-color: var(--error);
            background: var(--error-bg);
        }

        .option-btn[data-variant="danger"]:hover .option-arrow {
            color: var(--error);
        }

        /* ── Restart pill ── */
        .restart-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            align-self: center;
        }

        .restart-pill:hover {
            color: var(--text);
            border-color: var(--border-hover);
            background: var(--bg-secondary);
        }

        .restart-pill svg { width: 12px; height: 12px; }

        /* ── Footer note ── */
        .footer-note {
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.55;
            flex: none;
        }

        .footer-note a { color: var(--text-secondary); text-decoration: underline; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .page-wrapper { padding: 12px 10px 10px; }
            .page-header { margin-bottom: 10px; }
            .page-header h1 { font-size: 18px; }
            .chat-messages { padding: 16px 16px; }
            .chat-options { padding: 12px 14px 14px; max-height: 50vh; }
            .msg-bubble { font-size: 14px; padding: 11px 14px; }
        }
    </style>
</head>

<script>
(function () {
    'use strict';

    // ──────────────────────────────────────────────────────────
    // Config
    // ──────────────────────────────────────────────────────────
    const REFUND_FORM_URL = '/refreq/';
    const SUPPORT_EMAIL = 'clientsupport@vantagequant.com';
    // Swap this to the real Loom share ID when ready
    const LOOM_EMBED_URL = 'https://www.loom.com/embed/5aa3b0bdbd3c4a56883b4fbb51eca8fc';

    // ──────────────────────────────────────────────────────────
    // Reusable content blocks
    // ──────────────────────────────────────────────────────────
    const DETERRENT_WALL = {
        type: 'deterrent',
        title: 'What happens if you file a chargeback',
        items: [
            'Permanent termination of your software access',
            'Your account sent to our collections partner, American Collection Systems Incorporated, for the full balance plus fees',
            'Legal action through our legal partner, Vanguard Retail Law, for breach of contract — you pay the attorneys\' fees and damages',
            'Asset seizure, wage garnishment, bank levies, and liens on personal and business assets',
            'Delinquent debt reported to Equifax, Experian, and TransUnion — severe, lasting credit damage',

            'Any dispute gets resolved through binding arbitration in Miami-Dade County, Florida — no jury trial, no class action'
        ],
        footer: 'Nothing here waives your cardholder rights. But using a chargeback to get around the refund process is a breach of contract — and the consequences above apply.'
    };

    const CHARGEBACK_DETERRENT_MSG = [
        'Before we go any further, I need you to understand what\'s at stake under the Customer Agreement you signed. Your agreement treats an unauthorized chargeback as a material breach with serious consequences.'
    ];

    // ──────────────────────────────────────────────────────────
    // Flow definition
    // ──────────────────────────────────────────────────────────
    const flow = {

        // ─── Entry ─────────────────────────────────────────────
        'start': {
            agent: [
                'Hey, I\'m Caleb — a virtual assistant for the VantageQuant Payments Team.',
                'I walk through your situation using the exact rules in your Customer Agreement to give you a clear, quick answer.',
                'What would you like to do today?'
            ],
            options: [
                { label: 'I want to request a refund',           next: 'refund-ca-check' },
                { label: 'I have a billing or payment question', next: 'billing-menu' },
                { label: 'Something else',                        next: 'something-else' }
            ]
        },

        'something-else': {
            agent: [
                'No problem — what\'s going on?'
            ],
            options: [
                { label: 'I\'m thinking about disputing with my bank',  next: 'chargeback-threat' },
                { label: 'I already filed a chargeback',                next: 'chargeback-filed' },
                { label: 'I received a Final Notice from Vanguard',    next: 'settlement-intro' },
                { label: 'Back to main menu',                           next: 'start' }
            ]
        },

        // ─── Refund flow ───────────────────────────────────────
        'refund-ca-check': {
            agent: [
                'Got it. I\'ll ask a few quick questions and tell you straight whether you\'re eligible for a refund.',
                'First — when you bought the VantageQuant algorithm, did you sign the Customer Agreement during onboarding?'
            ],
            options: [
                { label: 'Yes, I signed it',        next: 'refund-eval-status' },
                { label: 'No, I never signed it',   next: 'denied-no-ca' },
                { label: 'I\'m not sure',           next: 'denied-ca-unsure' }

                'Here\'s the structure. The settlement is <strong>65% of your disputed amount</strong> — a 35% reduction from the full balance. That number is <strong>not negotiable</strong>. No counter-offers, no payment plans — one-time payment in full, wire or card.',
                'In exchange, we drop collections, halt the legal proceedings, waive all accrued attorneys\' fees and costs, and — most importantly — <strong>we do not report to Equifax, Experian, or TransUnion</strong>. The matter closes permanently with a full mutual release.',
                'Three non-negotiable conditions:<br><strong>1.</strong> You call your bank, retract the chargeback in writing, and send us the confirmation.<br><strong>2.</strong> We send you a Settlement Release Agreement — you sign and return it.<br><strong>3.</strong> You pay the settlement amount in full via the method we specify.',
                'One trade-off: accepting the settlement <strong>permanently terminates</strong> your access to the software. You walk away, we walk away, file closed for good.',
                'This offer expires in <strong>5 business days</strong>. If all three conditions aren\'t done in that window, it\'s off the table and enforcement resumes.'
            ],
            options: [
                { label: 'Yes — I accept. Tell me how to proceed',       next: 'settlement-accept' },
                { label: 'Can you go lower than 65%?',                    next: 'settlement-hold-line' },
                { label: 'Can I do a payment plan?',                       next: 'settlement-no-plan' },
                { label: 'Let me think about it',                         next: 'settlement-delay' },
                { label: 'No — I\'m not paying anything',                  next: 'settlement-declined' }
            ]
        },

        'settlement-accept': {
            type: 'settlement',
            agent: [
                'Good — right call.',
                'Retraction comes first. Call your bank\'s dispute department right now, tell them you\'re withdrawing the dispute on the charge from VantageQuant, and get written confirmation (email, reference number, or statement). Forward that to <strong>' + SUPPORT_EMAIL + '</strong>.',
                'Once we have the retraction confirmation, we\'ll email you the Settlement Release Agreement and payment instructions. Sign the release, pay the settlement, and within 24 hours of receipt we notify Vanguard and American Collection Systems to stand down. File closed permanently.',
                'Do the retraction today. The bank\'s withdrawal window and your 5 business day settlement window are both running.'
            ],
            options: [
                { label: 'Got it — closing chat to call my bank', next: 'start' }
            ]
        },

        'settlement-hold-line': {
            type: 'settlement',
            agent: [
                'I hear you, but I\'ll be straight. 65% isn\'t a starting point — it\'s already a big reduction from the full balance Vanguard is pursuing. I can\'t go below it, and I wouldn\'t if I could.',
                'The alternative isn\'t a lower settlement — it\'s the full enforcement process you\'ve already been noticed about. If Vanguard Retail Law secures a judgment, you\'re on the hook for the full disputed amount plus attorneys\' fees, arbitration fees, collection costs, and 1% monthly interest from the original due date. That easily doubles what you owe.',
                'The 65% settlement closes it today. That\'s the math.'
            ],
            options: [
                { label: 'Okay — I\'ll take the settlement',    next: 'settlement-accept' },
                { label: 'Let me think about it',                next: 'settlement-delay' },
                { label: 'Not interested',                        next: 'settlement-declined' }
            ]
        },

        'settlement-no-plan': {
            type: 'settlement',
            agent: [
                'Settlements are one-time payments — no payment plans. The point is to close the file in full. If a payment plan breaks, we\'re right back at collections and legal action, except now we\'ve both wasted time.',
                'If 65% isn\'t doable right now, think carefully. The alternative is more expensive — full balance plus fees, interest, collections, and credit damage will exceed the settlement amount by a lot.'
            ],
            options: [
                { label: 'I\'ll find the full amount — proceed with settlement', next: 'settlement-accept' },
                { label: 'Let me think about it',                                 next: 'settlement-delay' },
                { label: 'I can\'t do it',                                        next: 'settlement-declined' }
            ]
        },

        'settlement-delay': {
            type: 'settlement',
            agent: [
                'Take up to 24 hours if you need it — but the 5 business day deadline is firm. The pause on Vanguard and American Collection Systems only holds for the settlement window. I can\'t extend it.',
                'If you\'re in, call your bank to retract and email <strong>' + SUPPORT_EMAIL + '</strong> with the confirmation. If you\'re out, the offer withdraws automatically at the end of the window and enforcement resumes.'
            ],
            options: [
                { label: 'Okay, I\'ll retract and accept now',       next: 'settlement-accept' },
                { label: 'Close chat',                                next: 'start' }
            ]
        },

        'settlement-declined': {
            type: 'settlement',
            agent: [
                'Understood. You\'ve declined the settlement. This is being logged in your file — including the fact that a reduced-amount resolution was offered and rejected. That record will be used by Vanguard Retail Law in any arbitration that follows.',
                'Effective immediately: settlement window closed, full enforcement proceeding. Vanguard Retail Law resumes the breach of contract proceedings. Your account is active in collections with American Collection Systems Incorporated. Credit bureau reporting is on the timeline outlined in your Final Notice.'
            ],
            deterrent: true,
            loom: true,
            options: [
                { label: 'I\'ve changed my mind — I\'ll accept the settlement', next: 'settlement-terms' },
                { label: 'Close chat',                                           next: 'start' }
            ]
        }
    };

    // ──────────────────────────────────────────────────────────
    // State + DOM
    // ──────────────────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const optionsEl  = document.getElementById('options');

    let currentNode = 'start';
    let busy = false;

    // ──────────────────────────────────────────────────────────
    // Helpers
    // ──────────────────────────────────────────────────────────
    function scrollToBottom() {
        // Double rAF ensures layout has settled (including after images/iframes reserve space)
        requestAnimationFrame(function () {
            requestAnimationFrame(function () {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        });
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing';
        row.innerHTML = '<div class="msg-avatar">C</div>' +
                        '<div class="typing-bubble">' +
                        '<span class="typing-dot"></span>' +
                        '<span class="typing-dot"></span>' +
                        '<span class="typing-dot"></span>' +
                        '</div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function hideTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    function addAgentMessage(html) {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        row.innerHTML = '<div class="msg-avatar">C</div>' +
                        '<div class="msg-bubble"><p>' + html + '</p></div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addClauseCard(clause) {
        const card = document.createElement('div');
        card.className = 'msg-row agent';
        card.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                         '<div style="flex:1">' +
                         '<div class="clause-card">' +
                         '<div class="clause-label">' + escapeHtml(clause.label) + '</div>' +
                         '<div class="clause-text">' + escapeHtml(clause.text) + '</div>' +
                         '</div></div>';
        messagesEl.appendChild(card);
        scrollToBottom();
    }

    function addDeterrentWall() {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        let listItems = DETERRENT_WALL.items.map(function (i) { return '<li>' + i + '</li>'; }).join('');
        row.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                        '<div style="flex:1"><div class="deterrent-wall">' +
                        '<div class="dw-title">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>' +
                        DETERRENT_WALL.title +
                        '</div>' +
                        '<ul>' + listItems + '</ul>' +
                        '<div class="dw-footer">' + DETERRENT_WALL.footer + '</div>' +
                        '</div></div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addLoomEmbed() {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        row.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                        '<div style="flex:1" class="loom-wrap">' +
                        '<span class="loom-label">Watch: why we enforce the contract this way</span>' +
                        '<div class="loom-embed">' +
                        '<iframe src="' + LOOM_EMBED_URL + '" frameborder="0" webkitallowfullscreen mozallowfullscreen allowfullscreen></iframe>' +
                        '</div>' +
                        '</div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function addTerminalCTA(cta) {
        const row = document.createElement('div');
        row.className = 'msg-row agent';
        row.innerHTML = '<div class="msg-avatar" style="visibility:hidden"></div>' +
                        '<div style="flex:1" class="terminal-cta">' +
                        '<a href="' + cta.href + '" class="cta-btn">' +
                        escapeHtml(cta.label) +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>' +
                        '</a></div>';
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function clearOptions() {
        optionsEl.innerHTML = '';
    }

    function setOptionsLabel(text) {
        const label = document.createElement('div');
        label.className = 'chat-options-label';
        label.textContent = text;
        optionsEl.appendChild(label);
    }

    function renderOptions(options, isTerminal) {
        clearOptions();
        if (isTerminal && (!options || options.length === 0)) {
            // Terminal node with no options → offer restart only
            setOptionsLabel('Conversation complete');
            const restart = document.createElement('button');
            restart.className = 'restart-pill';
            restart.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Start a new conversation';
            restart.onclick = function () { goTo('start'); };
            optionsEl.appendChild(restart);
            scrollToBottom();
            return;
        }
        setOptionsLabel(isTerminal ? 'What would you like to do next?' : 'Choose an option');
        options.forEach(function (opt) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            if (opt.variant) btn.dataset.variant = opt.variant;
            btn.innerHTML = '<span>' + escapeHtml(opt.label) + '</span><span class="option-arrow">&rarr;</span>';
            btn.onclick = function () {
                if (busy) return;
                addUserMessage(opt.label);
                goTo(opt.next);
            };
            optionsEl.appendChild(btn);
        });
        scrollToBottom();
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // ──────────────────────────────────────────────────────────
    // Flow controller
    // ──────────────────────────────────────────────────────────
    async function goTo(nodeId) {
        const node = flow[nodeId];
        if (!node) {
            console.error('Missing flow node:', nodeId);
            return;
        }
        currentNode = nodeId;
        busy = true;
        clearOptions();

        // Play agent messages with typing indicator between each
        const msgs = node.agent || [];
        for (let i = 0; i < msgs.length; i++) {
            showTyping();
            await wait(typingDelay(msgs[i]));
            hideTyping();
            addAgentMessage(msgs[i]);
            await wait(900);
        }

        // Clause callout
        if (node.clause) {
            await wait(600);
            addClauseCard(node.clause);
            await wait(800);
        }

        // Deterrent wall
        if (node.deterrent) {
            await wait(600);
            addDeterrentWall();
            await wait(800);
        }

        // Loom embed
        if (node.loom) {
            await wait(600);
            addLoomEmbed();
            await wait(800);
        }

        // Terminal CTA (eligible path)
        if (node.cta) {
            await wait(600);
            addTerminalCTA(node.cta);
            await wait(700);
        }

        // Render options
        const isTerminal = !!(node.type && ['eligible', 'denied'].indexOf(node.type) >= 0 && !node.options);
        renderOptions(node.options || (isTerminal ? [] : [{ label: 'Back to menu', next: 'start' }]), isTerminal);

        busy = false;
    }

    function typingDelay(text) {
        const base = Math.min(Math.max(text.replace(/<[^>]+>/g, '').length * 24, 1100), 2600);
        return base;
    }

    function wait(ms) {
        return new Promise(function (r) { setTimeout(r, ms); });
    }

    // ──────────────────────────────────────────────────────────
    // Boot
    // ──────────────────────────────────────────────────────────
    goTo('start');

})();
</script>
</body>
</html>
