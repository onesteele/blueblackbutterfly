<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VantageQuant - Announcements</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06070c;
            --bg-card: #0e1016;
            --accent: #3b6dff;
            --accent-light: #9dbcff;
            --accent-dim: rgba(59, 109, 255, 0.15);
            --accent-glow: rgba(59, 109, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #1e2433;
            --success: #22c55e;
            --error: #ef4444;
            --sidebar-width: 60px;
            --sidebar-expanded: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ============================================================
           BACKGROUND ANIMATION
           ============================================================ */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dot-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(59, 109, 255, 0.18) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            /* filter blur removed for performance */
            opacity: 0.3;
            /* animation: floatOrb */ animation: none 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px; right: -100px;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(1.05); }
        }

        /* ============================================================
           SIDEBAR NAVIGATION
           ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: #111111;
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            overflow: hidden;
        }

        .sidebar:hover {
            width: var(--sidebar-expanded);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 14px;
            border-bottom: 1px solid var(--border);
            min-height: 60px;
            flex-shrink: 0;
        }

        .sidebar-logo img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .sidebar-logo-text {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease 0.1s;}

        .sidebar:hover .sidebar-logo-text {
            opacity: 1;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            margin: 2px 8px;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            position: relative;
            border-left: 3px solid transparent;
            margin-left: 0;
            padding-left: 15px;
        }

        .nav-item:hover {
            background: rgba(59, 109, 255, 0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .nav-item.active .nav-icon svg {
            color: var(--accent);
        }

        .nav-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            color: currentColor;
            transition: color 0.2s ease;
        }

        .nav-label {
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s ease 0.1s;
        }

        .sidebar:hover .nav-label {
            opacity: 1;
        }

        .sidebar-bottom {
            border-top: 1px solid var(--border);
            padding: 12px 0;
            flex-shrink: 0;
        }

        .nav-item.signout-item {
            color: var(--text-muted);
        }

        .nav-item.signout-item:hover {
            color: var(--error);
            background: rgba(239, 68, 68, 0.08);
        }

        /* ============================================================
           HAMBURGER MENU (MOBILE)
           ============================================================ */
        .hamburger-btn {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 200;
            width: 40px;
            height: 40px;
            background: #111111;
            border: 1px solid var(--border);
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
        }

        .hamburger-btn svg {
            width: 22px;
            height: 22px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            /* backdrop-filter removed for performance */
            z-index: 90;
        }

        .sidebar-overlay.show {
            display: block;
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main-content {
            margin-left: var(--sidebar-width);
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 10, 0.8);
            /* backdrop-filter removed for performance */
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 400;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-style: italic;}

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .admin-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);
            border: 1px solid rgba(59, 109, 255, 0.3);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-badge svg {
            width: 12px;
            height: 12px;
        }

        /* ============================================================
           PAGE BODY
           ============================================================ */
        .page-body {
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ============================================================
           ACTION BAR
           ============================================================ */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .action-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-count {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .item-count strong {
            color: var(--accent);
            font-weight: 700;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border: none;
            border-radius: 10px;
            color: #06070c;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(59, 109, 255, 0.35);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
        }

        /* ============================================================
           ANNOUNCEMENTS TABLE
           ============================================================ */
        .announcements-card {
            background: rgba(20, 20, 20, 0.8);
            /* backdrop-filter removed for performance */
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(59, 109, 255, 0.03);
        }

        .announcements-table {
            width: 100%;
            border-collapse: collapse;
        }

        .announcements-table thead {
            background: rgba(255, 255, 255, 0.02);
        }

        .announcements-table th {
            padding: 14px 20px;
            text-align: left;
            font-size: 11px;
            font-weight: 500;
            background: linear-gradient(135deg, rgba(59, 109, 255, 0.5) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);}

        .announcements-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            vertical-align: middle;
        }

        .announcements-table tbody tr {
            transition: background 0.2s ease;
        }

        .announcements-table tbody tr:last-child td {
            border-bottom: none;
        }

        .announcements-table tbody tr:hover {
            background: rgba(59, 109, 255, 0.04);
        }

        .announcement-title-cell {
            font-weight: 600;
            color: var(--text-primary);
        }

        .announcement-title-cell .announcement-preview {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.published {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .status-badge.draft {
            background: rgba(107, 114, 128, 0.15);
            color: var(--text-muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .pinned-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            background: var(--accent-dim);
            color: var(--accent);
        }

        .pinned-badge svg {
            width: 12px;
            height: 12px;
        }

        .badges-cell {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .btn-icon.delete:hover {
            border-color: var(--error);
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
        }

        /* ============================================================
           EMPTY & LOADING STATES
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 56px;
            height: 56px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================================
           MODAL OVERLAY
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            /* backdrop-filter removed for performance */
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(59, 109, 255, 0.05);
        }

        .modal::-webkit-scrollbar {
            width: 4px;
        }

        .modal::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            border-color: var(--error);
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        .modal-close svg {
            width: 18px;
            height: 18px;
        }

        .modal-body {
            padding: 28px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-textarea {
            resize: vertical;
            min-height: 160px;
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Toggle Switch */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-label-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border);
            border-radius: 26px;
            transition: 0.3s;
        }

        .toggle-slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(22px);
        }

        .toggles-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .toggle-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }

        /* Modal Footer */
        .modal-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .btn-danger {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: var(--error);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--error);
        }

        .btn-danger svg {
            width: 16px;
            height: 16px;
        }

        .modal-footer-right {
            display: flex;
            gap: 10px;
        }

        /* ============================================================
           TOAST NOTIFICATION
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .toast svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: var(--sidebar-expanded);
                z-index: 150;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .sidebar.mobile-open .nav-label,
            .sidebar.mobile-open .sidebar-logo-text {
                opacity: 1;
            }

            .hamburger-btn {
                display: flex;
            }

            .main-content {
                margin-left: 0;
            }

            .top-bar {
                padding: 16px 16px 16px 64px;
            }

            .page-body {
                padding: 20px 16px;
            }

            .page-title {
                font-size: 22px;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .announcements-table th:nth-child(3),
            .announcements-table td:nth-child(3) {
                display: none;
            }

            .toggles-row {
                grid-template-columns: 1fr;
            }

            .modal {
                max-width: 100%;
                border-radius: 16px;
            }

            .top-bar-right {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .announcements-table th:nth-child(4),
            .announcements-table td:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
    </div>
    <div class="dot-pattern"></div>

    <!-- Mobile Hamburger Button -->
    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileSidebar()">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        /* ============================================================
           MOBILE SIDEBAR TOGGLE
           ============================================================ */
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const btn = document.getElementById('hamburger-btn');

            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('show');

            if (sidebar.classList.contains('mobile-open')) {
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>';
            } else {
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>';
            }
        }

        /* ============================================================
           30-MINUTE INACTIVITY AUTO-LOGOUT
           ============================================================ */
        (function() {
            let inactivityTimer;
            const TIMEOUT = 30 * 60 * 1000;

            function resetTimer() {
                clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(() => {
                    console.log('Auto-logout: 30 minutes of inactivity');
                    window.signOut();
                }, TIMEOUT);
            }

            ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'].forEach(evt => {
                document.addEventListener(evt, resetTimer, true);
            });

            resetTimer();
        })();

        /* ============================================================
           STATE
           ============================================================ */
        let allAnnouncements = [];
        let editingId = null;

        /* ============================================================
           INIT & AUTH CHECK
           ============================================================ */
        (async function init() {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));

                const user = await window.getCurrentUser();
                if (!user) {
                    window.location.href = '/auth';
                    return;
                }

                const profile = await window.getUserProfile(user.id);
                if (!profile || !window.hasAdminAccess(profile)) {
                    alert('Access denied. Admin privileges required.');
                    await window.supabaseClient.auth.signOut();
                    window.location.href = '/auth';
                    return;
                }

                // Announcements management requires admin+ role
                if (!window.canManageContent(profile)) {
                    window.location.href = '/admin/customers.html';
                    return;
                }

                document.getElementById('admin-name').textContent = `${profile.first_name} ${profile.last_name}`;

                // Load permissions and apply role-based sidebar
                await window.loadRolePermissions();
                window.applySidebarRole(profile, 'announcements');

                await loadAnnouncements();
            } catch (error) {
                console.error('Admin init error:', error);
                window.location.href = '/auth';
            }
        })();

        /* ============================================================
           LOAD ANNOUNCEMENTS
           ============================================================ */
        async function loadAnnouncements() {
            const container = document.getElementById('announcements-list');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('announcements')
                    .select('*')
                    .order('is_pinned', { ascending: false })
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allAnnouncements = data || [];
                renderAnnouncementsTable();
            } catch (error) {
                console.error('Error loading announcements:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
                        </svg>
                        <h3>Error Loading Announcements</h3>
                        <p>Please try refreshing the page.</p>
                    </div>`;
            }
        }

        /* ============================================================
           RENDER TABLE
           ============================================================ */
        function renderAnnouncementsTable() {
            const container = document.getElementById('announcements-list');
            const countEl = document.getElementById('announcement-count');

            countEl.innerHTML = `Showing <strong>${allAnnouncements.length}</strong> announcement${allAnnouncements.length !== 1 ? 's' : ''}`;

            if (allAnnouncements.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
                        </svg>
                        <h3>No Announcements Yet</h3>
                        <p>Create your first announcement to notify clients.</p>
                        <button class="btn-primary" onclick="openCreateModal()" style="margin-top: 12px;">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                            New Announcement
                        </button>
                    </div>`;
                return;
            }

            let html = `
                <table class="announcements-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Pinned</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>`;

            allAnnouncements.forEach(item => {
                const statusClass = item.is_published ? 'published' : 'draft';
                const statusLabel = item.is_published ? 'Published' : 'Draft';
                const createdDate = item.created_at
                    ? new Date(item.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    : 'N/A';

                // Strip HTML for preview text
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = item.content || '';
                const plainPreview = tempDiv.textContent.substring(0, 80);

                const pinnedHtml = item.is_pinned
                    ? `<span class="pinned-badge"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>Pinned</span>`
                    : `<span style="color: var(--text-muted); font-size: 12px;">--</span>`;

                html += `
                    <tr>
                        <td>
                            <div class="announcement-title-cell">
                                ${escapeHtml(item.title || 'Untitled')}
                                ${plainPreview ? `<div class="announcement-preview">${escapeHtml(plainPreview)}</div>` : ''}
                            </div>
                        </td>
                        <td><span class="status-badge ${statusClass}"><span class="status-dot"></span>${statusLabel}</span></td>
                        <td>${pinnedHtml}</td>
                        <td>${createdDate}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-icon" title="Edit" onclick="openEditModal('${item.id}')">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </button>
                                <button class="btn-icon delete" title="Delete" onclick="confirmDeleteFromTable('${item.id}')">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        /* ============================================================
           MODAL CONTROLS
           ============================================================ */
        function openCreateModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'New Announcement';
            document.getElementById('announcement-id').value = '';
            document.getElementById('announcement-title').value = '';
            document.getElementById('announcement-content').value = '';
            document.getElementById('announcement-published').checked = false;
            document.getElementById('announcement-pinned').checked = false;
            document.getElementById('btn-delete').style.display = 'none';

            document.getElementById('announcement-modal').classList.add('show');
        }

        function openEditModal(id) {
            const item = allAnnouncements.find(a => a.id === id);
            if (!item) return;

            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Announcement';
            document.getElementById('announcement-id').value = id;
            document.getElementById('announcement-title').value = item.title || '';
            document.getElementById('announcement-content').value = item.content || '';
            document.getElementById('announcement-published').checked = item.is_published || false;
            document.getElementById('announcement-pinned').checked = item.is_pinned || false;
            document.getElementById('btn-delete').style.display = 'inline-flex';

            document.getElementById('announcement-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('announcement-modal').classList.remove('show');
            editingId = null;
        }

        // Close modal on overlay click
        document.getElementById('announcement-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        /* ============================================================
           SAVE (CREATE / UPDATE)
           ============================================================ */
        async function saveAnnouncement() {
            const title = document.getElementById('announcement-title').value.trim();
            const content = document.getElementById('announcement-content').value.trim();
            const isPublished = document.getElementById('announcement-published').checked;
            const isPinned = document.getElementById('announcement-pinned').checked;

            if (!title) {
                showToast('Please enter a title.', 'error');
                return;
            }

            if (!content) {
                showToast('Please enter content for the announcement.', 'error');
                return;
            }

            const payload = {
                title,
                content,
                is_published: isPublished,
                is_pinned: isPinned
            };

            try {
                let result;
                if (editingId) {
                    // Update
                    result = await window.supabaseClient
                        .from('announcements')
                        .update(payload)
                        .eq('id', editingId)
                        .select();
                } else {
                    // Insert
                    result = await window.supabaseClient
                        .from('announcements')
                        .insert(payload)
                        .select();
                }

                if (result.error) throw result.error;

                showToast(editingId ? 'Announcement updated successfully.' : 'Announcement created successfully.', 'success');
                closeModal();
                await loadAnnouncements();
            } catch (error) {
                console.error('Error saving announcement:', error);
                showToast('Error saving announcement. Please try again.', 'error');
            }
        }

        /* ============================================================
           DELETE
           ============================================================ */
        async function deleteAnnouncement() {
            if (!editingId) return;

            const item = allAnnouncements.find(a => a.id === editingId);
            const name = item ? item.title : 'this announcement';

            if (!confirm(`Are you sure you want to delete "${name}"? This action cannot be undone.`)) {
                return;
            }

            try {
                const { error } = await window.supabaseClient
                    .from('announcements')
                    .delete()
                    .eq('id', editingId);

                if (error) throw error;

                showToast('Announcement deleted successfully.', 'success');
                closeModal();
                await loadAnnouncements();
            } catch (error) {
                console.error('Error deleting announcement:', error);
                showToast('Error deleting announcement. Please try again.', 'error');
            }
        }

        function confirmDeleteFromTable(id) {
            const item = allAnnouncements.find(a => a.id === id);
            const name = item ? item.title : 'this announcement';

            if (!confirm(`Are you sure you want to delete "${name}"? This action cannot be undone.`)) {
                return;
            }

            (async () => {
                try {
                    const { error } = await window.supabaseClient
                        .from('announcements')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;

                    showToast('Announcement deleted successfully.', 'success');
                    await loadAnnouncements();
                } catch (error) {
                    console.error('Error deleting announcement:', error);
                    showToast('Error deleting announcement. Please try again.', 'error');
                }
            })();
        }

        /* ============================================================
           TOAST
           ============================================================ */
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toast-msg');

            msg.textContent = message;
            toast.className = 'toast ' + type;

            // Update icon based on type
            if (type === 'success') {
                toast.querySelector('svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />';
            } else {
                toast.querySelector('svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        /* ============================================================
           UTILS
           ============================================================ */
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
