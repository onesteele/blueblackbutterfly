<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VantageQuant - Video Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06070c;
            --bg-card: #0e1016;
            --accent: #3b6dff;
            --accent-light: #9dbcff;
            --accent-dim: rgba(59, 109, 255, 0.15);
            --accent-glow: rgba(59, 109, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #1e2433;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ========== Background ========== */
        .dot-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(59, 109, 255, 0.18) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        /* ========== Top Bar ========== */
        .video-topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.9);
            /* backdrop-filter removed for performance */
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 60px;
            gap: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .back-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        .topbar-title {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== Video Container ========== */
        .video-page {
            position: relative;
            z-index: 1;
        }

        .video-player-wrapper {
            width: 100%;
            background: #000;
            border-bottom: 1px solid var(--border);
        }

        .video-player-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            padding-top: 56.25%; /* 16:9 */
        }

        .video-player-inner iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ========== Video Info ========== */
        .video-info {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .video-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .video-category-badge.tutorials {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .video-category-badge.updates {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .video-category-badge.strategies {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.25);
        }

        .video-category-badge.default {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(59, 109, 255, 0.25);
        }

        .video-date {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .video-title {
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.25;
            margin-bottom: 20px;
        }

        .video-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin-bottom: 24px;
        }

        .video-description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.8;
            max-width: 800px;
            white-space: pre-wrap;
        }

        .video-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 32px;
        }

        .video-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
        }

        .video-action-btn:hover {
            border-color: rgba(59, 109, 255, 0.3);
            color: var(--text-primary);
            background: rgba(59, 109, 255, 0.08);
        }

        .video-action-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ========== Loading State ========== */
        .video-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }

        .video-loading .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(59, 109, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .video-loading p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ========== Error State ========== */
        .video-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            text-align: center;
            padding: 40px;
        }

        .video-error svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .video-error h2 {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .video-error p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .video-error a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .video-error a:hover {
            text-decoration: underline;
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .video-title {
                font-size: 24px;
            }

            .video-info {
                padding: 28px 16px 60px;
            }

            .video-description {
                font-size: 15px;
            }

            .topbar-title {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="dot-pattern"></div>

    <!-- Top Bar -->
    <div class="video-topbar">
        <div class="topbar-inner">
            <a href="/portal/content.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                Back to Library
            </a>
            <span class="topbar-title" id="topbarTitle"></span>
        </div>
    </div>

    <!-- Page Content -->
    <div class="video-page" id="videoPage">
        <div class="video-loading" id="videoLoading">
            <div class="spinner"></div>
            <p>Loading video...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="../activity-tracker.js"></script>
    <script>
        let currentUser = null;
        let currentProfile = null;

        (async function init() {
            try {
                const user = await window.getCurrentUser();
                if (!user) { window.location.href = '/auth'; return; }
                currentUser = user;

                const profile = await window.getUserProfile(user.id);
                if (!profile) { window.location.href = '/auth'; return; }
                currentProfile = profile;

                const userStatus = (profile.status || 'onboarding').toLowerCase();
                if (!['member', 'verified_member', 'active', 'free_trial', 'free_trial_expired'].includes(userStatus)) {
                    window.location.href = '/onboarding';
                    return;
                }

                // Get post ID from URL
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('id');

                if (!postId) {
                    showError('No video selected');
                    return;
                }

                // Fetch the post
                const { data: post, error } = await window.supabaseClient
                    .from('content_posts')
                    .select('*')
                    .eq('id', postId)
                    .eq('is_published', true)
                    .single();

                if (error || !post) {
                    showError('Video not found');
                    return;
                }

                renderVideo(post);

                // Track activity
                if (typeof window.trackActivity === 'function') {
                    window.trackActivity('content_view', '/portal/video', {
                        content_id: post.id,
                        title: post.title
                    });
                }
            } catch (err) {
                console.error('Init error:', err);
                showError('Something went wrong');
            }
        })();

        function renderVideo(post) {
            const page = document.getElementById('videoPage');
            const embedUrl = getEmbedUrl(post.video_url);
            const category = (post.category || 'general').toLowerCase();
            const badgeClass = ['tutorials', 'updates', 'strategies'].includes(category) ? category : 'default';
            const badgeLabel = post.category || 'General';
            const date = post.created_at ? formatDate(post.created_at) : '';

            // Update topbar
            document.getElementById('topbarTitle').textContent = post.title || 'Untitled';
            document.title = (post.title || 'Video') + ' - VantageQuant';

            let videoHtml = '';
            if (embedUrl) {
                // Add autoplay
                let autoplayUrl = embedUrl;
                autoplayUrl += (autoplayUrl.includes('?') ? '&' : '?') + 'autoplay=1';

                videoHtml = `
                    <div class="video-player-wrapper">
                        <div class="video-player-inner">
                            <iframe src="${escapeAttr(autoplayUrl)}" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
                        </div>
                    </div>
                `;
            }

            page.innerHTML = `
                ${videoHtml}
                <div class="video-info">
                    <div class="video-meta">
                        <span class="video-category-badge ${badgeClass}">${escapeHtml(badgeLabel)}</span>
                        <span class="video-date">${date}</span>
                    </div>
                    <h1 class="video-title">${escapeHtml(post.title || 'Untitled')}</h1>
                    <div class="video-divider"></div>
                    <div class="video-description">${escapeHtml(post.description || 'No description provided.')}</div>
                    <div class="video-actions">
                        <a href="/portal/content.html" class="video-action-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                            Back to Library
                        </a>
                        <button class="video-action-btn" onclick="copyLink()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                            Copy Link
                        </button>
                    </div>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('videoPage').innerHTML = `
                <div class="video-error">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <h2>${message}</h2>
                    <p><a href="/portal/content.html">Return to Content Library</a></p>
                </div>
            `;
        }

        function getEmbedUrl(url) {
            if (!url) return '';

            if (url.includes('loom.com')) {
                const m = url.match(/loom\.com\/(?:share|embed)\/([a-zA-Z0-9]+)/);
                if (m) return 'https://www.loom.com/embed/' + m[1];
            }

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let id = '';
                const a = url.match(/youtube\.com\/watch\?v=([^&]+)/);
                const b = url.match(/youtu\.be\/([^?&]+)/);
                const c = url.match(/youtube\.com\/embed\/([^?&]+)/);
                if (a) id = a[1]; else if (b) id = b[1]; else if (c) id = c[1];
                if (id) return 'https://www.youtube.com/embed/' + id;
            }

            return url;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(function() {
                var btn = document.querySelector('.video-action-btn:last-child');
                if (btn) {
                    var orig = btn.innerHTML;
                    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
                    btn.style.borderColor = 'rgba(34, 197, 94, 0.5)';
                    btn.style.color = '#22c55e';
                    setTimeout(function() {
                        btn.innerHTML = orig;
                        btn.style.borderColor = '';
                        btn.style.color = '';
                    }, 2000);
                }
            });
        }
    </script>
</body>
</html>
