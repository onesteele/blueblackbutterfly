<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VantageQuant - Content Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06070c;
            --bg-card: #0e1016;
            --accent: #3b6dff;
            --accent-light: #9dbcff;
            --accent-dim: rgba(59, 109, 255, 0.15);
            --accent-glow: rgba(59, 109, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #1e2433;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== Background ========== */
        .bg-animation { display: none; }

        .dot-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(59, 109, 255, 0.12) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
            transform: translateZ(0);
        }

        /* ========== Top Navbar ========== */
        .top-navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.85);
            /* backdrop-filter removed for performance */
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            gap: 16px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .navbar-logo {
            width: 38px;
            height: 38px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }

        .navbar-brand-text {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 500;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;}

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .navbar-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .navbar-links a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .navbar-links a.active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .navbar-user {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .navbar-user-name {
            font-weight: 700;
            color: var(--accent);
        }

        .signout-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .signout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        /* Mobile menu toggle */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
        }

        /* ========== Main Container ========== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ========== Page Header ========== */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 40px;
            font-weight: 400;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 50%, #2a4fd6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.2;
            font-style: italic;}

        .page-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ========== Filter & Search Bar ========== */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .category-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.6);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .category-tab:hover {
            border-color: rgba(59, 109, 255, 0.3);
            color: var(--text-primary);
            background: rgba(59, 109, 255, 0.08);
        }

        .category-tab.active {
            background: var(--accent-dim);
            border-color: rgba(59, 109, 255, 0.4);
            color: var(--accent);
        }

        .search-wrapper {
            position: relative;
            min-width: 260px;
            flex-shrink: 0;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            border-color: rgba(59, 109, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(59, 109, 255, 0.08);
        }

        /* ========== Content Grid ========== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* ========== Content Card ========== */
        .content-card {
            background: rgba(20, 20, 20, 0.8);
            /* backdrop-filter removed for performance */
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .content-card:hover {
            border-color: rgba(59, 109, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(59, 109, 255, 0.08);
        }

        .content-card-video {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .content-card-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        .content-card-video .video-thumbnail {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content-card-video .video-play-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.25);
            transition: background 0.2s ease;
            z-index: 2;
        }

        .content-card-video .video-play-overlay:hover {
            background: rgba(0, 0, 0, 0.15);
        }

        .video-play-btn {
            width: 60px;
            height: 60px;
            background: rgba(59, 109, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(59, 109, 255, 0.3);
        }

        .video-play-overlay:hover .video-play-btn {
            transform: scale(1.1);
            background: var(--accent);
            box-shadow: 0 4px 30px rgba(59, 109, 255, 0.5);
        }

        .video-play-btn svg {
            width: 24px;
            height: 24px;
            color: #000;
            margin-left: 3px;
        }

        .content-card-video .video-placeholder {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text-muted);
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9) 0%, rgba(30, 30, 30, 0.9) 100%);
        }

        .video-placeholder svg {
            opacity: 0.4;
        }

        .video-placeholder span {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.5;
        }


        .content-card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .content-card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .content-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content-badge.tutorials {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .content-badge.updates {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .content-badge.strategies {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.25);
        }

        .content-badge.default {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(59, 109, 255, 0.25);
        }

        .content-date {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .content-card-title {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .content-card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
        }

        /* ========== Empty State ========== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--accent-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state-icon svg {
            width: 36px;
            height: 36px;
            color: var(--accent);
            opacity: 0.6;
        }

        .empty-state-title {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ========== Loading State ========== */
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(59, 109, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-state p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .top-navbar {
                padding: 0 16px;
            }

            .navbar-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: rgba(10, 10, 10, 0.95);
                /* backdrop-filter removed for performance */
                flex-direction: column;
                padding: 16px;
                border-bottom: 1px solid var(--border);
                gap: 4px;
            }

            .navbar-links.open {
                display: flex;
            }

            .navbar-links a {
                width: 100%;
                padding: 12px 16px;
            }

            .mobile-menu-btn {
                display: block;
            }

            .navbar-user {
                display: none;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .controls-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-wrapper {
                min-width: unset;
            }

            .page-title {
                font-size: 30px;
            }

            .container {
                padding: 24px 16px 40px;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 26px;
            }

            .category-tabs {
                gap: 6px;
            }

            .category-tab {
                padding: 6px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="dot-pattern"></div>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <div class="cs-main-content container">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">Content Library</h1>
            <p class="page-subtitle">Access your training materials and resources</p>
        </div>

        <!-- Controls: Category Tabs + Search -->
        <div class="controls-bar">
            <div class="category-tabs" id="categoryTabs">
                <button class="category-tab active" data-category="all">All</button>
                <button class="category-tab" data-category="tutorials">Tutorials</button>
                <button class="category-tab" data-category="updates">Updates</button>
                <button class="category-tab" data-category="strategies">Strategies</button>
            </div>
            <div class="search-wrapper">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search content...">
            </div>
        </div>

        <!-- Content Grid -->
        <div class="content-grid" id="contentGrid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading content...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
    <script src="../activity-tracker.js"></script>
    <script>
        // ============================================================
        // AUTH CHECK & AUTO-LOGOUT
        // ============================================================
        let currentUser = null;
        let currentProfile = null;
        let autoLogoutTimer = null;
        let allContentPosts = [];
        let activeCategory = 'all';
        let searchQuery = '';

        function resetAutoLogout() {
            if (autoLogoutTimer) clearTimeout(autoLogoutTimer);
            autoLogoutTimer = setTimeout(() => {
                window.signOut();
            }, 30 * 60 * 1000); // 30 minutes
        }

        // Reset on user activity
        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, resetAutoLogout, { passive: true });
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        (async function init() {
            try {
                const user = await window.getCurrentUser();
                if (!user) {
                    window.location.href = '/auth';
                    return;
                }
                currentUser = user;

                const profile = await window.getUserProfile(user.id);
                if (!profile) {
                    window.location.href = '/auth';
                    return;
                }
                currentProfile = profile;

                // Check user status for access
                const userStatus = (profile.status || 'onboarding').toLowerCase();
                if (!['member', 'verified_member', 'active', 'free_trial', 'free_trial_expired'].includes(userStatus)) {
                    window.location.href = '/onboarding';
                    return;
                }

                // Inject sidebar
                window.injectClientSidebar('content', '../logo.png', userStatus);

                // Start auto-logout
                resetAutoLogout();

                // Load content
                await loadContent();
            } catch (err) {
                console.error('Init error:', err);
                window.location.href = '/auth';
            }
        })();

        // ============================================================
        // LOAD CONTENT
        // ============================================================
        async function loadContent() {
            try {
                allContentPosts = await window.getContentPosts(true);
                renderContent();
            } catch (err) {
                console.error('Error loading content:', err);
                document.getElementById('contentGrid').innerHTML = renderEmptyState('Failed to load content. Please try again.');
            }
        }

        // ============================================================
        // RENDER CONTENT
        // ============================================================
        function renderContent() {
            const grid = document.getElementById('contentGrid');
            let filtered = [...allContentPosts];

            // Filter by category
            if (activeCategory !== 'all') {
                filtered = filtered.filter(post =>
                    (post.category || '').toLowerCase() === activeCategory.toLowerCase()
                );
            }

            // Filter by search query
            if (searchQuery.trim()) {
                const q = searchQuery.trim().toLowerCase();
                filtered = filtered.filter(post =>
                    (post.title || '').toLowerCase().includes(q) ||
                    (post.description || '').toLowerCase().includes(q)
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = renderEmptyState(
                    searchQuery.trim() || activeCategory !== 'all'
                        ? 'No content matches your filters'
                        : 'No content available yet'
                );
                return;
            }

            grid.innerHTML = filtered.map(post => renderCard(post)).join('');
        }

        function renderCard(post) {
            const category = (post.category || 'general').toLowerCase();
            const badgeClass = ['tutorials', 'updates', 'strategies'].includes(category) ? category : 'default';
            const badgeLabel = post.category || 'General';
            const date = post.created_at ? formatDate(post.created_at) : '';
            const thumbnailHtml = getVideoThumbnail(post);

            return `
                <a class="content-card" href="/portal/video.html?id=${post.id}" data-id="${post.id}">
                    <div class="content-card-video">
                        ${thumbnailHtml}
                    </div>
                    <div class="content-card-body">
                        <div class="content-card-meta">
                            <span class="content-badge ${badgeClass}">${escapeHtml(badgeLabel)}</span>
                            <span class="content-date">${date}</span>
                        </div>
                        <h3 class="content-card-title">${escapeHtml(post.title || 'Untitled')}</h3>
                        <p class="content-card-desc">${escapeHtml(post.description || '')}</p>
                    </div>
                </a>
            `;
        }

        // ============================================================
        // VIDEO THUMBNAIL LOGIC
        // ============================================================
        function getThumbnailUrl(post) {
            if (post.thumbnail_url) return post.thumbnail_url;

            const url = post.video_url || '';

            // YouTube thumbnail
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let videoId = '';
                const ytLong = url.match(/youtube\.com\/watch\?v=([^&]+)/);
                const ytShort = url.match(/youtu\.be\/([^?&]+)/);
                const ytEmbed = url.match(/youtube\.com\/embed\/([^?&]+)/);
                if (ytLong) videoId = ytLong[1];
                else if (ytShort) videoId = ytShort[1];
                else if (ytEmbed) videoId = ytEmbed[1];
                if (videoId) return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            }

            // Loom thumbnail
            if (url.includes('loom.com')) {
                const loomMatch = url.match(/loom\.com\/(?:share|embed)\/([a-zA-Z0-9]+)/);
                if (loomMatch) return `https://cdn.loom.com/sessions/thumbnails/${loomMatch[1]}-with-play.gif`;
            }

            return '';
        }

        function getVideoThumbnail(post) {
            const url = post.video_url;
            if (!url) {
                return `
                    <div class="video-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                            <line x1="7" y1="2" x2="7" y2="22"></line>
                            <line x1="17" y1="2" x2="17" y2="22"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <line x1="2" y1="7" x2="7" y2="7"></line>
                            <line x1="2" y1="17" x2="7" y2="17"></line>
                            <line x1="17" y1="7" x2="22" y2="7"></line>
                            <line x1="17" y1="17" x2="22" y2="17"></line>
                        </svg>
                        <span>No video</span>
                    </div>
                `;
            }

            const thumbnailUrl = getThumbnailUrl(post);
            const postTitle = escapeAttr(post.title || 'Untitled');

            const bgContent = thumbnailUrl
                ? `<img class="video-thumbnail" src="${escapeAttr(thumbnailUrl)}" alt="${postTitle}" loading="lazy" onerror="this.style.display='none'">`
                : `<div class="video-placeholder" style="background:linear-gradient(135deg,#1a1a2e,#16213e);"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span>Video</span></div>`;

            return `
                ${bgContent}
                <div class="video-play-overlay">
                    <div class="video-play-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // CATEGORY TABS
        // ============================================================
        document.getElementById('categoryTabs').addEventListener('click', function(e) {
            const tab = e.target.closest('.category-tab');
            if (!tab) return;

            // Update active state
            this.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            activeCategory = tab.dataset.category;
            renderContent();
        });

        // ============================================================
        // SEARCH
        // ============================================================
        let searchDebounce = null;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
                searchQuery = this.value;
                renderContent();
            }, 250);
        });

        // ============================================================
        // MOBILE MENU TOGGLE
        // ============================================================
        function toggleMobileMenu() {
            document.getElementById('navLinks').classList.toggle('open');
        }

        // Close mobile menu on link click
        document.querySelectorAll('.navbar-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('open');
            });
        });

        // ============================================================
        // HELPERS
        // ============================================================
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;');
        }

        function renderEmptyState(message) {
            return `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </div>
                    <h3 class="empty-state-title">${message}</h3>
                    <p class="empty-state-text">Check back soon for new content</p>
                </div>
            `;
        }
    </script>
</body>
</html>
